<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои Отклики</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light p-5">

<div class="container">
    <h2 class="mb-4">Мои программы обучения и отклики</h2>

    <table class="table table-white shadow-sm rounded bg-white overflow-hidden">
        <thead class="table-dark">
        <tr>
            <th>Программа / Стажировка</th>
            <th>Статус</th>
            <th style="width: 300px;">Действие</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="app : ${applications}">
            <td class="fw-bold">
                <span th:text="${app.internship.title}">Название</span><br>
                <small class="text-muted" th:text="${app.internship.company != null ? app.internship.company.name : 'Университет'}"></small>
            </td>
            <td>
            <span class="badge"
                  th:classappend="${app.status.name() == 'ACCEPTED' || app.status.name() == 'APPROVED' ? 'bg-success' :
                                   (app.status.name() == 'REJECTED' ? 'bg-danger' : 'bg-warning')}"
                  th:text="${app.status}">Статус</span>
            </td>
            <td>
                <div class="d-flex gap-2">
                    <a th:href="@{/student/learning/{id}(id=${app.id})}" class="btn btn-primary btn-sm">
                        <i class="bi bi-book"></i> Обучение
                    </a>

                    <div th:if="${app.status.name() == 'ACCEPTED' || app.status.name() == 'APPROVED'}">
                        <a th:href="@{/student/messages/{id}(id=${app.internship.id})}" class="btn btn-success btn-sm">
                            <i class="bi bi-chat-dots"></i> Чатпен байланысу
                        </a>
                    </div>

                    <a th:if="${app.status.name() == 'VERIFIED'}" th:href="@{/student/job-market}" class="btn btn-outline-dark btn-sm">
                        На вакансии
                    </a>
                </div>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(applications)}">
            <td colspan="3" class="text-center py-4 text-muted">Вы еще не откликнулись ни на одну программу.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
