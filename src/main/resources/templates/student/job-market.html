<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Рынок вакансий | INTERN.PRO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold"><i class="bi bi-briefcase-fill text-success me-2"></i>Доступные вакансии компаний</h2>
    <a href="/student/my-applications" class="btn btn-outline-secondary">Назад</a>
  </div>

  <div class="row g-4">
    <div th:each="job : ${jobs}" class="col-md-6 col-lg-4">
      <div class="card h-100 border-0 shadow-sm rounded-4 p-3">
        <div class="card-body">
          <div class="d-flex align-items-center mb-3">
            <div class="bg-primary-subtle p-2 rounded-3 me-3">
              <i class="bi bi-building text-primary fs-4"></i>
            </div>
            <h5 class="card-title fw-bold mb-0" th:text="${job.title}">Название вакансии</h5>
          </div>
          <p class="text-muted small mb-2">
            <i class="bi bi-geo-alt me-1"></i> <span th:text="${job.city}">Город</span>
          </p>
          <p class="card-text text-secondary" th:text="${#strings.abbreviate(job.description, 100)}">Описание...</p>

          <div class="mt-auto pt-3 border-top">
            <div class="d-flex justify-content-between align-items-center">
              <span class="fw-bold text-dark" th:text="${job.company.name}">Компания</span>
              <form th:action="@{/student/apply/{id}(id=${job.id})}" method="post">
                <button type="submit" class="btn btn-primary rounded-pill btn-sm px-3">Откликнуться</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div th:if="${#lists.isEmpty(jobs)}" class="col-12 text-center py-5">
      <i class="bi bi-search fs-1 text-muted"></i>
      <p class="mt-3 text-muted">На данный момент нет доступных вакансий от компаний.</p>
    </div>
  </div>
</div>
</body>
</html>
