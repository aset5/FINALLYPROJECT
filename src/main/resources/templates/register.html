<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация в системе</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; }
    .card { border-radius: 15px; border: none; }
    .btn-primary { border-radius: 10px; padding: 10px; font-weight: bold; }
    .form-control, .form-select { border-radius: 10px; }
  </style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg p-4">
        <div class="text-center mb-4">
          <h2 class="fw-bold">Регистрация</h2>
          <p class="text-muted">Выберите тип аккаунта и заполните данные</p>
        </div>

        <div th:if="${error}" class="alert alert-danger py-2 small text-center" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">

          <div class="mb-3">
            <label class="form-label fw-bold small">Кто вы?</label>
            <select name="roleType" id="roleType" class="form-select" onchange="toggleFields()" required>
              <option value="STUDENT">Студент</option>
              <option value="UNIVERSITY">Представитель ВУЗа (Регистрация организации)</option>
              <option value="COMPANY">Компания</option>
            </select>
          </div>

          <div class="mb-3" id="studentFields">
            <label class="form-label fw-bold small">Ваш Университет</label>
            <select name="universityId" class="form-select">
              <option value="">-- Выберите из списка --</option>
              <option th:each="uni : ${universities}"
                      th:value="${uni.id}"
                      th:text="${uni.name}"></option>
            </select>
            <div class="form-text mt-1 small">Если вашего ВУЗа нет в списке, его должен зарегистрировать администратор ВУЗа.</div>
          </div>

          <div class="mb-3" id="uniAdminFields" style="display:none;">
            <label class="form-label fw-bold small">Название Университета</label>
            <input type="text" name="uniName" class="form-control" placeholder="Напр: Narxoz University">
          </div>

          <hr>

          <div class="mb-3">
            <label class="form-label fw-bold small">Логин (Username)</label>
            <input type="text" name="username" class="form-control" placeholder="ivanov123" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold small">Полное имя (ФИО)</label>
            <input type="text" name="fullName" class="form-control" placeholder="Иванов Иван Иванович" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold small">Электронная почта</label>
            <input type="email" name="email" class="form-control" placeholder="example@mail.com" required>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold small">Пароль</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn btn-primary w-100 mb-3">Зарегистрироваться</button>

          <div class="text-center">
            <span class="small text-muted">Уже есть аккаунт?</span>
            <a th:href="@{/login}" class="small text-decoration-none fw-bold">Войти</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  function toggleFields() {
    const role = document.getElementById("roleType").value;
    const studentFields = document.getElementById("studentFields");
    const uniAdminFields = document.getElementById("uniAdminFields");

    // Если студент — показываем список ВУЗов
    if (role === "STUDENT") {
      studentFields.style.display = "block";
      uniAdminFields.style.display = "none";
    }
    // Если ВУЗ — показываем текстовое поле для нового названия
    else if (role === "UNIVERSITY") {
      studentFields.style.display = "none";
      uniAdminFields.style.display = "block";
    }
    // Если компания — скрываем всё лишнее
    else {
      studentFields.style.display = "none";
      uniAdminFields.style.display = "none";
    }
  }

  // Запускаем при загрузке, чтобы установить верное состояние
  window.onload = toggleFields;
</script>

</body>
</html>
