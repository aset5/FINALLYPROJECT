<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Панель управления ВУЗа</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow-sm">
  <div class="container">
        <span class="navbar-brand fw-bold">
            <i class="bi bi-mortarboard-fill me-2"></i> UniPortal: Админ-панель
        </span>
    <div class="d-flex align-items-center">
      <span class="text-white me-3" th:text="${user.username}">Username</span>
      <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-outline-light btn-sm">Выйти</button>
      </form>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <div class="row">
    <div class="col-md-4">
      <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-body text-center p-4">
          <div class="display-1 text-primary mb-3">
            <i class="bi bi-building"></i>
          </div>
          <h4 class="fw-bold" th:text="${university != null ? university.name : 'ВУЗ не привязан'}">Название ВУЗа</h4>
          <p class="text-muted">Официальный представитель</p>
          <hr>
          <div class="text-start small">
            <p><strong>Админ:</strong> <span th:text="${user.fullName}">ФИО</span></p>
            <p><strong>Email:</strong> <span th:text="${user.email}">email@test.com</span></p>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="row g-4">
        <div class="col-sm-6">
          <div class="card border-0 shadow-sm rounded-4 bg-white p-3">
            <div class="d-flex align-items-center">
              <div class="icon-box bg-info-subtle text-info p-3 rounded-3 me-3">
                <i class="bi bi-people-fill fs-3"></i>
              </div>
              <div>
                <h6 class="mb-0 text-muted small">Ваши студенты</h6>
                <h3 class="fw-bold mb-0">124</h3>
              </div>
            </div>
          </div>
        </div>
        <div class="col-sm-6">
          <div class="card border-0 shadow-sm rounded-4 bg-white p-3">
            <div class="d-flex align-items-center">
              <div class="icon-box bg-success-subtle text-success p-3 rounded-3 me-3">
                <i class="bi bi-file-earmark-check fs-3"></i>
              </div>
              <div>
                <h6 class="mb-0 text-muted small">Одобрено заявок</h6>
                <h3 class="fw-bold mb-0">42</h3>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card border-0 shadow-sm rounded-4 mt-4">
        <div class="card-header bg-white border-0 pt-4 px-4">
          <h5 class="fw-bold">Управление</h5>
        </div>
        <div class="card-body p-4">
          <div class="list-group list-group-flush">
            <a href="#" class="list-group-item list-group-item-action py-3 px-0 border-bottom">
              <i class="bi bi-person-plus me-2 text-primary"></i> Просмотреть список студентов
            </a>
            <a href="#" class="list-group-item list-group-item-action py-3 px-0 border-bottom">
              <i class="bi bi-briefcase me-2 text-primary"></i> Мониторинг стажировок
            </a>
            <a href="#" class="list-group-item list-group-item-action py-3 px-0">
              <i class="bi bi-gear me-2 text-primary"></i> Настройки профиля ВУЗа
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
